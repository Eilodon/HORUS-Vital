name: CI

on:
  pull_request:
  push:
    branches: [master]

jobs:
  verify-ffi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      # nm (binutils) ships preinstalled on ubuntu-latest — no setup needed.
      # Diffs `nm -D` of the committed libhorus.so against
      # modules/horus-sdk/ffi-contract.json's jniSymbols list.
      - run: scripts/check-jni-symbols.sh

  check-generated:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
      # Regenerates HorusSdk.contract.generated.ts + HorusFfiContract.kt from
      # ffi-contract.json and fails if the committed output doesn't match —
      # catches hand-edits to generated files or a JSON bump without regen.
      - run: scripts/check-generated.sh

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 20
      - run: npm ci
      - run: npx tsc --noEmit
